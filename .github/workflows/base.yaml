name: Build texlive-full(base)

on:
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ayaka-notes/texlive-full
  IMAGE_TAG: base

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout GitHub Action
        uses: actions/checkout@main
        with:
          submodules: true
          token: ${{ secrets.ORGTOKEN }}

      - name: Update for Latest
        run: |
          git submodule update --remote --recursive
          tree .

      # 这一段是你文章里强调的关键配置
      # 如果后面还有“本地构建镜像被后续 Dockerfile FROM”的场景，这个必须开
      - name: Set up Docker (enable containerd image store)
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push arch image
        id: build_base
        uses: docker/build-push-action@v7
        with:
          context: texlive/Base
          file: texlive/Base/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # 每个架构都单独打 tag，避免 GHCR cleanup 把无 tag 层清掉
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ matrix.platform_pair }}
          outputs: type=image,name-canonical=true,push=true
          provenance: false
          sbom: false
          # 可选：如果你想加缓存，可以打开下面两行
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build_base.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-amd64@sha256:$(basename $(ls * | grep -E '^[a-f0-9]{64}$' | sed -n '1p')) \
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-arm64@sha256:$(basename $(ls * | grep -E '^[a-f0-9]{64}$' | sed -n '2p'))

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}